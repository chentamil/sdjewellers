<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiper Slider - Conditional Pagination</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
<style>
.swiper-slide img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}
</style>
</head>
<body>

<section class="container py-5">
  <h2 class="text-center mb-4">Featured Products</h2>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=1"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=2"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=3"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=4"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=5"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=6"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=7"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=8"></div>
    </div>

    <!-- Navigation Arrows -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

    <!-- Pagination -->
    <div class="swiper-pagination"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
<script>
const swiper = new Swiper('.mySwiper', {
  slidesPerView: 6,
  spaceBetween: 15,
  loop: true,
  navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
  pagination: {
    el: '.swiper-pagination',
    clickable: true,
    dynamicBullets: true,
  },
  breakpoints: {
    0: {  // Mobile: no pagination, 2 slides
      slidesPerView: 2,
      pagination: false
     //pagination: { el: '.swiper-pagination', clickable: true, dynamicBullets: true }
    },
    768: { // Tablet+: pagination true, 4 slides
      slidesPerView: 4,
      pagination: { el: '.swiper-pagination', clickable: true, dynamicBullets: true }
    },
    992: { // Desktop: 6 slides, pagination true
      slidesPerView: 6
    }
  }
});
</script>

</body>
</html>
