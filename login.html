<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Protected Page</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="container" style="max-width: 400px;">
    <div class="card shadow-sm border-0 rounded-3 p-4">
      <h2 class="text-center mb-4 fw-semibold text-dark">Login</h2>
      <form method="POST" action="/login">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold text-muted">Username</label>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username"
            required />
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold text-muted">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password"
            required />
        </div>
        <button type="submit" class="w-100 btn btn-primary fw-semibold">Login</button>
        <!-- <p class="m-2 list-unstyled small text-muted">
        By continuing, you agree to EXample <a href="kjk">Conditions of Use</a> and <a href="bbk">Privacy Notice</a>.
        </p> -->

        <p class="m-2 list-unstyled small text-muted">
          Forget/Reset password mail us at <a href="mailto:help@example.com">help@example.com</a>
        </p>

        <div class="text-center mt-3 small text-muted">
          All rights reserved.Your Shopname1 2026
        </div>
      </form>
    </div>
  </div>

</body>

</html>
