<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ecommerce</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.card { margin-bottom:20px; border-radius:12px; overflow:hidden; }
.price { color:green; font-weight:bold; }
img { height:220px; object-fit:cover; width:100%; }
</style>
</head>

<body>

<div class="container my-4">

<input id="search" class="form-control mb-3" placeholder="Search products...">

<div class="row" id="products"></div>

</div>

<script>
const SHEET_API = "https://opensheet.elk.sh/1rmgeZpbauAxN92wx8Po5Ufpc6dk-9TRWEv7xXSL602E/Sheet1";
const phone = "919994868106";

let allProducts = [];

fetch(SHEET_API)
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    render(data);
  });

function render(products){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{

    container.innerHTML += `
      <div class="col-md-4">
        <div class="card p-2">

          <img src="${p.image1}">

          <div class="p-2">
            <h6>${p.name}</h6>
            <div class="price">₹ ${p.price}</div>

            <a target="_blank"
               class="btn btn-success btn-sm w-100 mt-2"
               href="https://wa.me/${phone}?text=${encodeURIComponent('Hi I want '+p.name+' ₹'+p.price)}">
              Buy on WhatsApp
            </a>

            <button class="btn btn-outline-dark btn-sm w-100 mt-2"
              onclick="openGallery('${p.image1}','${p.image2}','${p.image3}','${p.name}')">
              View Gallery
            </button>

          </div>

        </div>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(val)
  );

  render(filtered);
});

/* SIMPLE GALLERY */
function openGallery(i1,i2,i3,name){
  const w = window.open();
  w.document.write(`
    <h2>${name}</h2>
    <img src="${i1}" style="width:100%"><br><br>
    <img src="${i2}" style="width:100%"><br><br>
    <img src="${i3}" style="width:100%">
  `);
}
</script>

</body>
</html>
