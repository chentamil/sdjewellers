<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ecommerce Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css">

<style>
body { background:#f4f6f9; }

.card {
  border-radius:12px;
  overflow:hidden;
  background:#fff;
  margin-bottom:20px;
}

.price { color:green; font-weight:bold; }

.product-slider img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.share-btn {
  border:none;
  background:none;
  cursor:pointer;
  margin-left:8px;
}

.toast-box {
  position:fixed;
  top:20px;
  right:20px;
  background:#28a745;
  color:#fff;
  padding:10px 15px;
  border-radius:6px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<div class="container my-4">

<input id="search" class="form-control mb-3" placeholder="Search products...">

<div class="row" id="products"></div>

</div>

<div id="toast" class="toast-box">Link copied!</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<!-- PhotoSwipe -->
<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.js';

window.initLightbox = function(items){
  const lightbox = new PhotoSwipeLightbox({
    dataSource: items,
    pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.js')
  });

  lightbox.init();
  lightbox.loadAndOpen(0);
};
</script>

<script>
const SHEET_API = "https://opensheet.elk.sh/1rmgeZpbauAxN92wx8Po5Ufpc6dk-9TRWEv7xXSL602E/Sheet1";
const phone = "919999999999";

let allProducts = [];

/* FETCH */
fetch(SHEET_API)
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    render(data);
  });

/* RENDER */
function render(products){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{

    container.innerHTML += `
      <div class="col-md-4">
        <div class="card p-2">

          <div class="product-slider slider-${i}">
            <div><img src="${p.image1}"></div>
            <div><img src="${p.image2}"></div>
            <div><img src="${p.image3}"></div>
          </div>

          <div class="p-2">
            <h6>${p.name}</h6>

            <div class="d-flex align-items-center justify-content-between">
              <div class="price">₹ ${p.price}</div>

              <!-- MODERN SHARE BUTTON -->
              <button class="share-btn" onclick="shareProduct('${p.name}','${p.price}')">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-share" viewBox="0 0 16 16">
                <path d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5m-8.5 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3m11 5.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3"></path>
              </svg></button>
            </div>

            <a target="_blank"
               class="btn btn-success btn-sm w-100 mt-2"
               href="https://wa.me/${phone}?text=${encodeURIComponent('Hi I want '+p.name+' ₹'+p.price)}">
              Buy on WhatsApp
            </a>

            <!-- ZOOM GALLERY -->
            <button class="btn btn-outline-dark btn-sm w-100 mt-2"
              onclick="openGallery(${i})">
              View Gallery
            </button>

          </div>
        </div>
      </div>
    `;
  });

  setTimeout(()=>{
    $('.product-slider').not('.slick-initialized').slick({
      dots:true,
      arrows:true
    });
  },300);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  render(allProducts.filter(p => p.name.toLowerCase().includes(val)));
});

/* =========================
   ZOOM GALLERY (PhotoSwipe)
========================= */
function openGallery(i){
  const p = allProducts[i];

  const items = [
    { src: p.image1, w:1200, h:900 },
    { src: p.image2, w:1200, h:900 },
    { src: p.image3, w:1200, h:900 }
  ];

  window.initLightbox(items);
}

/* =========================
   SHARE (MODERN + FALLBACK)
========================= */
function shareProduct(name,price){

  const url = location.href + "#product";

  const text = `Check this product: ${name} (₹ ${price})`;

  // MODERN SHARE API
  if(navigator.share){
    navigator.share({
      title: name,
      text: text,
      url: url
    });
  }
  else {
    // FALLBACK COPY LINK
    navigator.clipboard.writeText(text + " " + url);
    showToast();
  }
}

/* TOAST */
function showToast(){
  const t = document.getElementById("toast");
  t.style.display = "block";
  setTimeout(()=> t.style.display="none", 2000);
}
</script>

</body>
</html>
