<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
<!-- ✅ PATCH: PhotoSwipe CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css"/>

<style>
body { background:#f1f3f6; font-family:Arial; }

.card {
  border:none;
  border-radius:12px;
  overflow:hidden;
  transition:0.2s;
  background:#fff;
}
.card:hover {
  transform:translateY(-4px);
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.product-slider img {
  height:220px;
  object-fit:cover;
  width:100%;
}

.price {
  color:#388e3c;
  font-weight:bold;
  font-size:16px;
}

.share-btn {
  border:none;
  background:none;
  cursor:pointer;
}
.share-btn svg { color:#555; }
.share-btn:hover svg { color:#000; }

/* accordion */
.acc-header {
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  margin-top:10px;
  font-size:14px;
}

.acc-content {
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s ease;
}

.rotate { transform:rotate(180deg); }

/* toast */
.toast-box {
  position:fixed;
  top:20px;
  right:20px;
  background:#28a745;
  color:#fff;
  padding:10px 15px;
  border-radius:6px;
  display:none;
}
</style>
</head>

<body>

<div class="container my-4">
<h4 class="mb-3">Products</h4>
<div class="row" id="products"></div>
</div>

<div id="toast" class="toast-box">Link copied!</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<!-- ✅ PATCH: PhotoSwipe JS -->
<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.js';

window.initLightbox = function(items){
  const lightbox = new PhotoSwipeLightbox({
    dataSource: items,
    pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.js')
  });
  lightbox.init();
  lightbox.loadAndOpen(0);
};
</script>

<script>
const phone="919999999999";

const products = Array.from({length:6}, (_,i)=>({
  name:"Product "+(i+1),
  price:500+i*100,
  color:["red","blue","green","orange","purple","black"][i],
  details:{
    Colour:"Cream",
    Fabric:"Tissue Silk",
    Occasion:"Wedding",
    Code:"SER"+(1000+i)
  }
}));

const container=document.getElementById("products");

products.forEach((p,i)=>{

  const base=`https://placehold.co/600x400/${p.color}/white?text=${p.name}`;
  const imgs=[base,base+"&v=2",base+"&v=3"];

  const sliderClass="slider"+i;
  const accId="acc"+i;

  container.innerHTML+=`
  <div class="col-md-4 mb-4 d-flex">
    <div class="card w-100 p-2">

      <div class="product-slider ${sliderClass}">
        ${imgs.map(img=>`<div><img src="${img}"></div>`).join("")}
      </div>

      <div class="p-2">

        <div>${p.name}</div>

        <!-- PRICE + SHARE -->
        <div class="d-flex justify-content-between align-items-center">
          <div class="price">₹ ${p.price}</div>

          <button class="share-btn" onclick="shareProduct('${p.name}')">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5"/>
            </svg>
          </button>
        </div>

        <a href="https://wa.me/${phone}?text=${encodeURIComponent('Hi, I am interested in '+p.name+' (₹ '+p.price+')')}"
        class="btn btn-success btn-sm w-100 mt-2" target="_blank">WhatsApp</a>

        <!-- ✅ PATCH: VIEW GALLERY BUTTON -->
        <button class="btn btn-outline-dark btn-sm w-100 mt-2"
        onclick="openGallery(${i})">
          View Product Gallery
        </button>

        <!-- ACCORDION -->
        <div class="acc-header" onclick="toggleAcc('${accId}', this)">
          <span>View Details</span>
          <svg width="18" height="18">
            <path d="M7 10l5 5 5-5" stroke="black" stroke-width="2" fill="none"/>
          </svg>
        </div>

        <div class="acc-content" id="${accId}">
          <table class="table table-bordered mt-2">
            ${Object.entries(p.details).map(([k,v])=>
              `<tr><td><b>${k}</b></td><td>${v}</td></tr>`
            ).join("")}
          </table>
        </div>

      </div>
    </div>
  </div>`;
});

// ✅ SAFE SLICK INIT (fixes your issue)
setTimeout(()=>{
  document.querySelectorAll('.product-slider').forEach(slider=>{
    if (!slider.classList.contains('slick-initialized')) {
      $(slider).slick({
        slidesToShow:1,
        arrows:true,
        dots:true
      });
    }
  });
},300);

/* ACCORDION */
function toggleAcc(id,el){
  const c=document.getElementById(id);
  const icon=el.querySelector("svg");

  if(c.style.maxHeight){
    c.style.maxHeight=null;
    icon.classList.remove("rotate");
  } else {
    c.style.maxHeight=c.scrollHeight+"px";
    icon.classList.add("rotate");
  }
}

/* ✅ PATCH: GALLERY FUNCTION (PhotoSwipe) */
function openGallery(i){
  const p=products[i];
  const base=`https://placehold.co/1200x900/${p.color}/white?text=${p.name}`;

  const items=[
    { src: base, w:1200, h:900 },
    { src: base+"&v=2", w:1200, h:900 },
    { src: base+"&v=3", w:1200, h:900 }
  ];

  window.initLightbox(items);
}

/* SHARE */
function shareProduct(name){
  const url=location.href+"#"+name;

  if(navigator.share){
    navigator.share({title:name,url:url});
  } else {
    navigator.clipboard.writeText(url);
    showToast();
  }
}

function showToast(){
  const t=document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}
</script>

</body>
</html>
