<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiper Slider - Conditional Pagination</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
<style>
.swiper-slide img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}
</style>
</head>
<body>

<section class="container py-5">
  <h2 class="text-center mb-4">Featured Products</h2>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=1"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=2"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=3"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=4"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=5"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=6"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=7"></div>
      <div class="swiper-slide"><img src="https://placehold.co/600x400?text=8"></div>
    </div>

    <!-- Navigation Arrows -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

    <!-- Pagination -->
    <div class="swiper-pagination"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
<script>
const swiper = new Swiper('.mySwiper', {
  slidesPerView: 6,
  spaceBetween: 15,
  loop: true,
  navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
  pagination: {
    el: '.swiper-pagination',
    clickable: true,
    dynamicBullets: true,
  },
  breakpoints: {
    0: {  // Mobile: no pagination, 2 slides
      slidesPerView: 2,
      pagination: false
     //pagination: { el: '.swiper-pagination', clickable: true, dynamicBullets: true }
    },
    768: { // Tablet+: pagination true, 4 slides
      slidesPerView: 4,
      pagination: { el: '.swiper-pagination', clickable: true, dynamicBullets: true }
    },
    992: { // Desktop: 6 slides, pagination true
      slidesPerView: 6
    }
  }
});
</script>

</body>
</html>














<!--  -->
<style>
  body { font-family: Arial; }
  .swiper { width: 90%; margin: 20px auto; }
  .swiper-slide { text-align: center; font-size: 18px; background: #eee; display: flex; align-items: center; justify-content: center; height: 200px; }
</style>

<h2>Slider 1 (Autoplay 5s)</h2>
<div class="swiper" id="slider1">
  <div class="swiper-wrapper">
    <div class="swiper-slide">1</div>
    <div class="swiper-slide">2</div>
    <div class="swiper-slide">3</div>
    <div class="swiper-slide">4</div>
    <div class="swiper-slide">5</div>
  </div>
  <!-- Pagination -->
  <div class="swiper-pagination"></div>
  <!-- Navigation -->
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>

<h2>Slider 2 (Autoplay 8s)</h2>
<div class="swiper" id="slider2">
  <div class="swiper-wrapper">
    <div class="swiper-slide">A</div>
    <div class="swiper-slide">B</div>
    <div class="swiper-slide">C</div>
    <div class="swiper-slide">D</div>
  </div>
  <div class="swiper-pagination"></div>
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>

<script>
  const swiper1 = new Swiper("#slider1", {
    slidesPerView: 3,
    spaceBetween: 20,
    loop: true,
    autoplay: { delay: 5000 },
    navigation: { nextEl: "#slider1 .swiper-button-next", prevEl: "#slider1 .swiper-button-prev" },
    pagination: { el: "#slider1 .swiper-pagination", clickable: true },
    breakpoints: { 0: { slidesPerView: 1 }, 768: { slidesPerView: 2 }, 992: { slidesPerView: 3 } }
  });

  const swiper2 = new Swiper("#slider2", {
    slidesPerView: 2,
    spaceBetween: 20,
    loop: true,
    autoplay: { delay: 8000 },
    navigation: { nextEl: "#slider2 .swiper-button-next", prevEl: "#slider2 .swiper-button-prev" },
    pagination: { el: "#slider2 .swiper-pagination", clickable: true },
    breakpoints: { 0: { slidesPerView: 1 }, 768: { slidesPerView: 2 }, 992: { slidesPerView: 2 } }
  });
</script>
