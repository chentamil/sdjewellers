<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Ecommerce V3</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css">

<style>
body { background:#f4f6f9; }

.card { border-radius:12px; overflow:hidden; background:#fff; margin-bottom:20px; }

.price { color:green; font-weight:bold; }

.product-slider img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.share-btn { border:none; background:none; cursor:pointer; }

.filter-btn {
  margin-right:8px;
  margin-bottom:10px;
}

.cart-box {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}

.modal-bg {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#fff;
  width:90%;
  max-width:500px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container my-4">

<h3>Pro Store</h3>

<!-- SEARCH -->
<input id="search" class="form-control mb-3" placeholder="Search products...">

<!-- CATEGORY FILTER -->
<div id="categories" class="mb-3"></div>

<div class="row" id="products"></div>

</div>

<!-- CART BUTTON -->
<div class="cart-box" onclick="openCart()">
🛒 Cart (<span id="cartCount">0</span>)
</div>

<!-- CART MODAL -->
<div class="modal-bg" id="cartModal">
  <div class="modal-box">
    <h5>Your Cart</h5>
    <div id="cartItems"></div>
    <hr>
    <button class="btn btn-success w-100" onclick="checkout()">WhatsApp Checkout</button>
    <button class="btn btn-secondary w-100 mt-2" onclick="closeCart()">Close</button>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<script>
const API = "https://opensheet.elk.sh/1oJPvnsl4rUAJXNyWIyHnwJG96faKQmS8ZKaRKm6jt3E/Sheet1";
const phone = "919999999999";

let products = [];
let cart = [];

/* LOAD DATA */
fetch(API)
.then(r=>r.json())
.then(data=>{
  products = data;
  render(data);
  buildCategories(data);
});

/* RENDER PRODUCTS */
function render(list){
  const box = document.getElementById("products");
  box.innerHTML = "";

  list.forEach((p,i)=>{

    box.innerHTML += `
      <div class="col-md-4">

        <div class="card p-2">

          <div class="product-slider slider-${i}">
            <div><img src="${p.image1}"></div>
            <div><img src="${p.image2}"></div>
            <div><img src="${p.image3}"></div>
          </div>

          <div class="p-2">

            <h6>${p.name}</h6>
            <div class="price">₹ ${p.price}</div>

            <button class="btn btn-primary btn-sm w-100 mt-2"
              onclick='addToCart(${JSON.stringify(p)})'>
              Add to Cart
            </button>

          </div>

        </div>

      </div>
    `;
  });

  setTimeout(()=>{
    $('.product-slider').slick({dots:true, arrows:true});
  },300);
}

/* CATEGORY BUTTONS */
function buildCategories(data){
  const box = document.getElementById("categories");
  const cats = [...new Set(data.map(p=>p.category))];

  box.innerHTML = `<button class="btn btn-dark btn-sm filter-btn" onclick="filterCat('all')">All</button>`;

  cats.forEach(c=>{
    box.innerHTML += `
      <button class="btn btn-outline-dark btn-sm filter-btn"
      onclick="filterCat('${c}')">${c}</button>
    `;
  });
}

/* FILTER */
function filterCat(cat){
  if(cat==="all") render(products);
  else render(products.filter(p=>p.category===cat));
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
  const val = e.target.value.toLowerCase();
  render(products.filter(p=>p.name.toLowerCase().includes(val)));
});

/* CART */
function addToCart(p){
  cart.push(p);
  document.getElementById("cartCount").innerText = cart.length;
}

function openCart(){
  document.getElementById("cartModal").style.display="flex";

  let html = "";
  cart.forEach(c=>{
    html += `<p>${c.name} - ₹${c.price}</p>`;
  });

  document.getElementById("cartItems").innerHTML = html;
}

function closeCart(){
  document.getElementById("cartModal").style.display="none";
}

/* WHATSAPP CHECKOUT */
function checkout(){
  let msg = "Order:\n";
  cart.forEach(c=>{
    msg += `${c.name} - ₹${c.price}\n`;
  });

  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}
</script>

</body>
</html>
