<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>

<style>
body { background:#f1f3f6; font-family:Arial; }

.card {
  border:none;
  border-radius:12px;
  overflow:hidden;
  transition:0.2s;
  background:#fff;
}
.card:hover {
  transform:translateY(-4px);
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.product-slider img {
  height:220px;
  object-fit:cover;
  width:100%;
}

.price { color:#388e3c; font-weight:bold; }

.share-btn { border:none; background:none; cursor:pointer; }

/* accordion */
.acc-header {
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  margin-top:10px;
}

.acc-content {
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s ease;
}

.rotate { transform:rotate(180deg); }

/* toast */
.toast-box {
  position:fixed;
  top:20px;
  right:20px;
  background:#28a745;
  color:#fff;
  padding:10px;
  border-radius:6px;
  display:none;
}

/* GALLERY */
.gallery-img {
  max-width:100%;
  max-height:90vh;
  touch-action:none;
}

.gallery-arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.2);
  color:#fff;
  border:none;
  font-size:30px;
  padding:10px;
}

.left { left:10px; }
.right { right:10px; }

</style>
</head>

<body>

<div class="container my-4">
<h4>Products</h4>
<div class="row" id="products"></div>
</div>

<div id="toast" class="toast-box">Link copied!</div>

<!-- GALLERY MODAL -->
<div class="modal fade" id="galleryModal">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-dark">

      <div class="modal-header border-0">
        <button class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body d-flex justify-content-center align-items-center position-relative">
        <div id="galleryTrack" style="display:flex; transition:0.4s;"></div>

        <button class="gallery-arrow left" onclick="prevSlide()">‹</button>
        <button class="gallery-arrow right" onclick="nextSlide()">›</button>
      </div>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const phone="919999999999";

let galleryImages=[];
let currentSlide=0;

const products = Array.from({length:6}, (_,i)=>({
  name:"Product "+(i+1),
  price:500+i*100,
  color:["red","blue","green","orange","purple","black"][i],
  details:{
    Colour:"Cream",
    Fabric:"Tissue Silk",
    Occasion:"Wedding",
    Code:"SER"+(1000+i)
  }
}));

const container=document.getElementById("products");

products.forEach((p,i)=>{

  const base=`https://placehold.co/600x400/${p.color}/white?text=${p.name}`;
  const imgs=[base,base+"&v=2",base+"&v=3"];

  const sliderClass="slider"+i;
  const accId="acc"+i;

  container.innerHTML+=`
  <div class="col-md-4 mb-4 d-flex">
    <div class="card w-100 p-2">

      <div class="product-slider ${sliderClass}">
        ${imgs.map(img=>`<div><img src="${img}"></div>`).join("")}
      </div>

      <div class="p-2">
        <div>${p.name}</div>

        <div class="d-flex justify-content-between align-items-center">
          <div class="price">₹ ${p.price}</div>

          <button class="share-btn" onclick="shareProduct('${p.name}')">
            <svg width="16" height="16" fill="currentColor">
              <path d="M13.5 1a1.5 1.5 0 1 0 0 3"/>
            </svg>
          </button>
        </div>

        <a href="https://wa.me/${phone}?text=${encodeURIComponent('Hi, I am interested in '+p.name)}"
        class="btn btn-success btn-sm w-100 mt-2" target="_blank">WhatsApp</a>

        <!-- NEW BUTTON -->
        <button class="btn btn-outline-dark btn-sm w-100 mt-2"
        onclick="openGallery(${i})">
          View Product Gallery
        </button>

        <div class="acc-header" onclick="toggleAcc('${accId}', this)">
          <span>View Details</span>
          <svg width="18"><path d="M7 10l5 5 5-5" stroke="black" fill="none"/></svg>
        </div>

        <div class="acc-content" id="${accId}">
          <table class="table mt-2">
            ${Object.entries(p.details).map(([k,v])=>
              `<tr><td><b>${k}</b></td><td>${v}</td></tr>`
            ).join("")}
          </table>
        </div>

      </div>
    </div>
  </div>`;
});

/* SLICK */
setTimeout(()=>{
  document.querySelectorAll('.product-slider').forEach(slider=>{
    if (!slider.classList.contains('slick-initialized')) {
      $(slider).slick({
        slidesToShow:1,
        arrows:true,
        dots:true,
        autoplay:true,
        infinite:true
      });
    }
  });
},300);

/* GALLERY */
function openGallery(i){
  const p=products[i];
  const base=`https://placehold.co/800x600/${p.color}/white?text=${p.name}`;

  galleryImages=[base,base+"&v=2",base+"&v=3",base+"&v=4"];
  currentSlide=0;

  renderGallery();
  new bootstrap.Modal(document.getElementById("galleryModal")).show();
}

function renderGallery(){
  const track=document.getElementById("galleryTrack");

  track.innerHTML = galleryImages.map(img=>`
    <div style="min-width:100%; display:flex; justify-content:center;">
      <img src="${img}" class="gallery-img">
    </div>
  `).join("");

  updateSlide();
  enableZoom();
}

function updateSlide(){
  document.getElementById("galleryTrack").style.transform =
    `translateX(-${currentSlide*100}%)`;
}

function nextSlide(){
  currentSlide=(currentSlide+1)%galleryImages.length;
  updateSlide();
}

function prevSlide(){
  currentSlide=(currentSlide-1+galleryImages.length)%galleryImages.length;
  updateSlide();
}

/* PINCH ZOOM */
function enableZoom(){
  document.querySelectorAll('.gallery-img').forEach(img=>{

    let scale=1, startDist=0, currentX=0, currentY=0;

    img.addEventListener("touchstart", e=>{
      if(e.touches.length===2){
        startDist=getDistance(e);
      }
    });

    img.addEventListener("touchmove", e=>{
      if(e.touches.length===2){
        let newDist=getDistance(e);
        scale = Math.min(Math.max(1, newDist/startDist), 4);
        img.style.transform=`scale(${scale}) translate(${currentX}px,${currentY}px)`;
      }
    });

    img.addEventListener("touchstart", e=>{
      if(e.touches.length===1 && scale>1){
        img.startX=e.touches[0].clientX - currentX;
        img.startY=e.touches[0].clientY - currentY;
      }
    });

    img.addEventListener("touchmove", e=>{
      if(e.touches.length===1 && scale>1){
        currentX=e.touches[0].clientX - img.startX;
        currentY=e.touches[0].clientY - img.startY;
        img.style.transform=`scale(${scale}) translate(${currentX}px,${currentY}px)`;
      }
    });

  });
}

function getDistance(e){
  return Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
}

/* ACCORDION */
function toggleAcc(id,el){
  const c=document.getElementById(id);
  if(c.style.maxHeight){ c.style.maxHeight=null; }
  else { c.style.maxHeight=c.scrollHeight+"px"; }
}

/* SHARE */
function shareProduct(name){
  const url=location.href+"#"+name;

  if(navigator.share){
    navigator.share({title:name,url});
  } else {
    navigator.clipboard.writeText(url);
    showToast();
  }
}

function showToast(){
  const t=document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}
</script>

</body>
</html>
